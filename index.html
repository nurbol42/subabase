<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Профиль - Статусы</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-secondary: #777;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        h3 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: var(--text-main);
        }

        #myInfo {
            font-size: 14px;
            color: var(--text-main);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        /* Сетка кнопок как на скришоте */
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            border: 1px solid rgba(0,0,0,0.1);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-game { background-color: #17a2b8; }
        .btn-home { background-color: #6c757d; }

        /* Список группы */
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .user-details strong {
            display: block;
            font-size: 15px;
            color: var(--text-main);
        }

        .user-details span {
            font-size: 13px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h3>Мой профиль</h3>
            <div id="myInfo">Загрузка данных...</div>
            <div class="grid-buttons">
                <button class="btn-study" onclick="changeStatus('📚 Учусь', '#28a745')">📚 Учусь</button>
                <button class="btn-coffee" onclick="changeStatus('☕ Кофе', '#ffc107')">☕ Кофе</button>
                <button class="btn-game" onclick="changeStatus('🎮 В игре', '#17a2b8')">🎮 В игре</button>
                <button class="btn-home" onclick="changeStatus('🏠 Дома', '#6c757d')">🏠 Дома</button>
            </div>
        </div>

        <div class="card">
            <h3>Монитор группы</h3>
            <div id="groupList">
                </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // Конфигурация
        const URL = 'https://uskgwslaspamdwcrower.supabase.com'; 
        const KEY = 'sb_publishable_MxA6YiduUA0NeVn6Mcr38g_EtLtqABO';
        const MY_ID = '3e08bbbb-7986-44fa-a52d-3dc7941a471c';

        const supabase = createClient(URL, KEY);

        // Функция смены статуса
        window.changeStatus = async (statusText, statusColor) => {
            const { error } = await supabase
                .from('profiles')
                .update({ 
                    status: statusText, 
                    color: statusColor 
                })
                .eq('id', MY_ID);

            if (error) {
                console.error("Ошибка обновления:", error);
                alert("Не удалось обновить статус. Проверьте RLS!");
            } else {
                fetchGroup(); // Сразу обновляем список
            }
        };

        // Функция получения данных
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                console.error("Ошибка загрузки:", error);
                return;
            }

            // Обновляем список группы
            const listDiv = document.getElementById('groupList');
            listDiv.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div class="user-details">
                        <strong>${user.username}</strong>
                        <span>${user.status || 'Статус не задан'}</span>
                    </div>
                </div>
            `).join('');

            // Обновляем приветствие
            const me = data.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
            } else {
                document.getElementById('myInfo').innerText = `Пользователь не найден`;
            }
        }

        // Запуск при открытии
        fetchGroup();

        // Автообновление каждые 5 секунд
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
