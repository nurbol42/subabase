<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Status App</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #3ecf8e; /* Цвет Supabase */
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; margin-bottom: 20px; font-weight: 600; }

        #myInfo {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        /* Список пользователей */
        #groupList { margin: 20px 0; }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fafafa;
            transition: transform 0.2s;
        }

        .user-item:hover { transform: translateX(5px); }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 15px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        /* Кнопки управления */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.8; }

        .btn-online { background: #2ecc71; color: white; }
        .btn-away { background: #f1c40f; color: white; }
        .btn-busy { background: #e74c3c; color: white; }
        .btn-offline { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Команда</h2>
    <div id="myInfo">Загрузка профиля...</div>
    
    <div id="groupList">
        </div>

    <div class="controls">
        <button class="btn-online" onclick="changeStatus('В сети', '#2ecc71')">В сети</button>
        <button class="btn-away" onclick="changeStatus('Отойду', '#f1c40f')">Отойду</button>
        <button class="btn-busy" onclick="changeStatus('Занят', '#e74c3c')">Занят</button>
        <button class="btn-offline" onclick="changeStatus('Не в сети', '#95a5a6')">Выйти</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // ВАЖНО: Ссылка должна быть API URL, а не ссылка на Dashboard
    const URL = 'https://uskgwslaspamdwcrower.supabase.com';
    const KEY = 'sb_publishable_MxA6YiduUA0NeVn6Mcr38g_EtLtqABO';
    const supabase = createClient(URL, KEY);

    const MY_ID = '3e08bbbb-7986-44fa-a52d-3dc7941a471c';

    window.changeStatus = async (text, color) => {
        const { error } = await supabase
            .from('profiles')
            .update({ status: text, color: color })
            .eq('id', MY_ID);

        if (error) {
            alert("Ошибка! Проверьте RLS политики в Supabase.");
            console.error(error);
        } else {
            fetchGroup();
        }
    };

    async function fetchGroup() {
        const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .order('username', { ascending: true });

        if (error) return console.error(error);

        const list = document.getElementById('groupList');
        list.innerHTML = data.map(user => `
            <div class="user-item">
                <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                <div style="flex-grow: 1;">
                    <strong>${user.username}</strong><br>
                    <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                </div>
            </div>
        `).join('');

        const me = data.find(u => u.id === MY_ID);
        if (me) {
            document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
        } else {
            document.getElementById('myInfo').innerText = `ID не найден в базе`;
        }
    }

    // Первичная загрузка
    fetchGroup();

    // Обновление каждые 5 секунд
    setInterval(fetchGroup, 5000);
</script>

</body>
</html>
