<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Status Monitor</title>
    <style>
        :root {
            --bg: #eef2f7;
            --card: #ffffff;
            --text: #2d3748;
            --muted: #8896a5;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            gap: 16px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
            width: 100%;
            max-width: 440px;
        }

        .card h3 {
            font-size: 17px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: -0.3px;
        }

        /* Profile info */
        #myInfo {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        #myInfo span {
            color: var(--text);
            font-weight: 700;
        }

        /* Status grid */
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .status-btn {
            border: none;
            padding: 13px 10px;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            color: white;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .status-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
        .status-btn:active { transform: translateY(0); box-shadow: none; opacity: 0.9; }
        .status-btn.active-status { outline: 3px solid rgba(0,0,0,0.25); outline-offset: 2px; }

        .btn-study  { background: linear-gradient(135deg, #38d96a, #28a745); }
        .btn-coffee { background: linear-gradient(135deg, #ffd454, #ffc107); color: #5a3e00; }
        .btn-game   { background: linear-gradient(135deg, #3dd5f3, #17a2b8); }
        .btn-home   { background: linear-gradient(135deg, #adb5bd, #6c757d); }

        /* Group list */
        .user-item {
            display: flex;
            align-items: center;
            padding: 11px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .user-item:last-child { border-bottom: none; }

        .status-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
        }

        .user-details strong {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .user-details span {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
        }

        /* ---- Username edit section ---- */
        .edit-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .edit-section label {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .edit-section input {
            flex: 1;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .edit-section input:focus {
            border-color: #667eea;
        }

        .btn-save {
            border: none;
            background: linear-gradient(135deg, #667eea, #5a67d8);
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-save:active { transform: translateY(0); }

        .save-msg {
            font-size: 12px;
            font-weight: 700;
            color: #28a745;
            min-height: 16px;
            transition: opacity 0.3s;
        }

        #groupList:empty::after {
            content: 'Загрузка...';
            font-size: 13px;
            color: var(--muted);
            display: block;
            padding: 8px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>Мой профиль</h3>
        <p id="myInfo">Загрузка...</p>
        <div class="controls">
            <button class="btn-study" onclick="changeStatus('📚 Учусь', '#28a745')">📚 Учусь</button>
            <button class="btn-coffee" onclick="changeStatus('☕ Кофе-брейк', '#ffc107')">☕ Кофе</button>
            <button class="btn-game" onclick="changeStatus('🎮 В игре', '#17a2b8')">🎮 В игре</button>
            <button class="btn-home" onclick="changeStatus('🏠 Дома', '#6c757d')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h3>Монитор группы</h3>
        <div id="groupList">Поиск студентов...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://uskgwslaspamdwcrower.supabase.co';
        const KEY = 'sb_publishable_MxA6YiduUA0NeVn6Mcr38g_EtLtqABO';
        const supabase = createClient(URL, KEY);

        const MY_ID = '3e08bbbb-7986-44fa-a52d-3dc7941a471c'; 

        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase.");
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong><br>
                        <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === MY_ID);
            if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
        }

        fetchGroup();

        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
